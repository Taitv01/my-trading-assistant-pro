name: Scan HNX
on:
  schedule:
    - cron: '30 2 * * 1-5' # 2:30 UTC = 9:30 AM Vietnam
  workflow_dispatch:

jobs:
  run-hnx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install pandas requests vnstock==0.2.9.2.3 beautifulsoup4 packaging lxml matplotlib
        
      - name: Quét HNX
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.bot --exchange HNX

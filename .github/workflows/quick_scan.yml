name: Quick Scan (VN30)

on:
  schedule:
    # Chạy từ 9:15 đến 14:45 VN (tức 02:15 đến 07:45 UTC)
    # Cron: Phút | Giờ (UTC) | ...
    - cron: '15,45 2-7 * * 1-5' # Chạy phút 15 và 45, từ 2h đến 7h UTC, T2-T6
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Quick Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --mode quick

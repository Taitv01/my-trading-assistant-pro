name: Discovery Scan (Full Market)

on:
  schedule:
    # 15:30 VN -> 08:30 UTC (Quét sau khi hết giờ giao dịch cho an toàn)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    # Tăng timeout lên 360 phút (6 tiếng) để tránh bị ngắt giữa chừng
    timeout-minutes: 360 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Discovery Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py --mode discovery

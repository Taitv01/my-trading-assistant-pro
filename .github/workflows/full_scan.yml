name: Full Scan (All Markets)

on:
  schedule:
    # At 10:00, 13:00, 15:00 Vietnam Time (UTC+7)
    # Converted to UTC: 3:00, 6:00, 8:00 UTC
    - cron: '0 3 * * 1-5'   # 10:00 VN
    - cron: '0 6 * * 1-5'   # 13:00 VN
    - cron: '0 8 * * 1-5'   # 15:00 VN
  workflow_dispatch:  # Manual trigger

jobs:
  full-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Full scan may take up to 45 mins
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Full Scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner.py --mode full

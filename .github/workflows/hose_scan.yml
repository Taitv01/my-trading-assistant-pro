name: Scan HOSE
on:
  schedule:
    - cron: '15 2 * * 1-5' # 2:15 UTC = 9:15 AM Vietnam
  workflow_dispatch:

jobs:
  run-hose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        # LƯU Ý: Đã khóa version vnstock để tránh lỗi
        run: pip install pandas requests vnstock==0.2.9.2.3 beautifulsoup4 packaging lxml matplotlib
        
      - name: Quét HOSE
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # LƯU Ý: Chạy module src.bot
        run: python -m src.bot --exchange HOSE

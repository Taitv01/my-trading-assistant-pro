name: Scan HOSE
on:
  schedule:
    - cron: '15 2 * * 1-5' # 9:15 AM VN
  workflow_dispatch:
jobs:
  run-hose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install pandas requests vnstock beautifulsoup4 packaging lxml matplotlib
      - name: Quét HOSE
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.bot --exchange HOSE
